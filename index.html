<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>押したら負け</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #14141c;
      color: #eee;
      font-family: sans-serif;
      user-select: none;
    }
    #hud {
      position: fixed;
      top: 14px;
      left: 0;
      width: 100%;
      text-align: center;
      pointer-events: none;
    }
    #timer { font-size: 34px; font-weight: bold; }
    #highscore { font-size: 13px; color: #9aa; }
    #message {
      position: fixed;
      top: 110px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 18px;
      color: #ffcf6e;
      min-height: 26px;
      pointer-events: none;
    }
    #realButton {
      position: absolute;
      padding: 22px 44px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: #c0392b;
      border: 4px solid #922;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }
    #realButton.tempting {
      background: #2ecc71;
      border-color: #1a8a4a;
      animation: pulse 0.6s infinite alternate;
    }
    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.12); }
    }
    .fake-button {
      position: absolute;
      padding: 10px 18px;
      font-size: 14px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .fake-dialog {
      position: absolute;
      width: 300px;
      background: #f2f2f2;
      color: #222;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      padding: 16px;
      font-size: 14px;
      z-index: 5;
    }
    .fake-dialog .dialog-ok {
      display: block;
      margin: 14px auto 0;
      padding: 8px 30px;
      background: #3478f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .clone-button {
      position: absolute;
      padding: 22px 44px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: #c0392b;
      border: 4px solid #922;
      border-radius: 14px;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      right: 16px;
      bottom: 46px;
      background: #fff;
      color: #222;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      padding: 14px 16px;
      font-size: 14px;
      z-index: 6;
    }
    .toast button {
      margin-left: 10px;
      padding: 6px 16px;
      background: #3478f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .fake-over {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 16, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 9;
      text-align: center;
    }
    .fake-over button {
      padding: 14px 36px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #3478f6;
      color: #fff;
      cursor: pointer;
    }
    .cookie-banner {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      background: #22252e;
      color: #ddd;
      padding: 14px;
      font-size: 13px;
      text-align: center;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.5);
      z-index: 6;
      box-sizing: border-box;
    }
    .cookie-banner button {
      margin: 0 6px;
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .cookie-banner .agree { background: #3478f6; color: #fff; }
    .cookie-banner .deny { background: #555; color: #eee; }
    .perm-prompt {
      position: fixed;
      top: 8px;
      left: 8px;
      width: 320px;
      background: #fff;
      color: #222;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      padding: 14px;
      font-size: 13px;
      z-index: 7;
    }
    .perm-prompt .perm-actions { text-align: right; margin-top: 10px; }
    .perm-prompt button {
      margin-left: 8px;
      padding: 6px 16px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #f4f4f4;
      cursor: pointer;
    }
    .perm-prompt .allow { background: #3478f6; color: #fff; border: none; }
    .update-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #fdf3d7;
      color: #333;
      padding: 8px;
      font-size: 13px;
      text-align: center;
      z-index: 7;
      box-sizing: border-box;
    }
    .update-bar button {
      margin-left: 8px;
      padding: 4px 14px;
      border: 1px solid #c9a;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
    }
    .rank-form input {
      display: block;
      margin: 10px auto;
      padding: 8px;
      width: 85%;
      font-size: 14px;
    }
    .fake-cursor {
      position: fixed;
      font-size: 20px;
      pointer-events: none;
      z-index: 12;
    }
    .dl-bar {
      position: fixed;
      left: 16px;
      bottom: 16px;
      background: #2b2e38;
      color: #ddd;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      padding: 12px 16px;
      font-size: 13px;
      z-index: 6;
    }
    .dl-bar button {
      margin-left: 8px;
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      background: #3478f6;
      color: #fff;
      cursor: pointer;
    }
    body.flipped { transform: rotate(180deg); transition: transform 0.6s; }
    body.nocursor, body.nocursor * { cursor: none !important; }
    body.inverted { filter: invert(1); }
    body.shaking { animation: shake 0.12s infinite; }
    @keyframes shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-8px, 5px); }
      50% { transform: translate(6px, -7px); }
      75% { transform: translate(-5px, -4px); }
      100% { transform: translate(7px, 6px); }
    }
    #blackout {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 8;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 16, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      text-align: center;
    }
    #overlay h1 { margin: 0; }
    #overlay button {
      padding: 14px 36px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #3478f6;
      color: #fff;
      cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="timer">0.0秒</div>
    <div id="highscore"></div>
  </div>
  <div id="message"></div>

  <button id="realButton">押すな</button>
  <div id="blackout"></div>

  <div id="overlay">
    <h1>押したら負け</h1>
    <p>ルールはひとつ。<strong>何も押すな。</strong><br>
    赤いボタンも、途中で現れる怪しいボタンも、ぜんぶ罠だ。<br>
    画面はあの手この手で君にクリックさせようとしてくる。</p>
    <button id="startButton">はじめる</button>
    <div id="result"></div>
  </div>

  <script src="dont-press.js"></script>
</body>
</html>
