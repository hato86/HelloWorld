<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気ジェネラティブアート</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }
    #artCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #info {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.7;
      pointer-events: none;
    }
    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
    }
    a.back {
      position: fixed;
      top: 12px;
      right: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="artCanvas"></canvas>
  <div id="status">位置情報を確認中…</div>
  <div id="info">読み込み中…</div>
  <a class="back" href="index.html">← もどる</a>
  <script src="weather-art.js"></script>
</body>
</html>
